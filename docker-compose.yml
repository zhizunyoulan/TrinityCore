# docker-compose.yml for Trinity.
#
# Start the server with `docker compose up -d --build`
#
# Don't make changes this file! make a `docker-compose.override.yml` and make your
# changes there instead.

services:
  tc-database:
    container_name: tc-database
    image: mysql:8.4
    networks:
      - tc-network
    ports:
      - ${DOCKER_DB_EXTERNAL_PORT:-3306}:3306
    environment:
      - MYSQL_ROOT_PASSWORD=${DOCKER_DB_ROOT_PASSWORD:-password}
    volumes:
      - ${DOCKER_VOL_DB}:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: "/usr/bin/mysql --user=root --password=$$MYSQL_ROOT_PASSWORD --execute \"SHOW DATABASES;\""
      interval: 5s
      timeout: 10s
      retries: 40


  tc-worldserver:
    container_name: tc-worldserver
    image: tc-worldserver:${DOCKER_IMAGE_TAG:-master}
    build:
      context: .
      target: worldserver
      dockerfile: contrib/Docker/Dockerfile
    networks:
      - tc-network
    stdin_open: true
    tty: true
    restart: unless-stopped
    ports:
      - ${DOCKER_WORLD_SERVER_PORT:-8085}:8085
      - ${DOCKER_WORLD_INSTANCE_SERVER_PORT:-8086}:8086
      - ${DOCKER_WORLD_SOAP_PORT:-7878}:7878
    volumes:
      - ${DOCKER_VOL_ETC:-./etc}:/trinity/dist/etc
      # [osxfs optimization]: https://stackoverflow.com/a/63437557/1964544
      - ${DOCKER_VOL_LOGS:-./logs}:/trinity/logs:delegated
      # client data
      - ${DOCKER_VOL_DATA:-ac-client-data}:/trinity/data/:ro
    depends_on:
      tc-database:
        condition: service_healthy

  tc-bnetserver:
    container_name: tc-bnetserver
    image: tc-bnetserver:${DOCKER_IMAGE_TAG:-master}
    build:
      context: .
      target: bnetserver
      dockerfile: contrib/Docker/Dockerfile
    networks:
      - tc-network
    tty: true
    restart: unless-stopped
    volumes:
      - ${DOCKER_VOL_ETC:-./etc}:/trinity/dist/etc
      # [osxfs optimization]: https://stackoverflow.com/a/63437557/1964544
      - ${DOCKER_VOL_LOGS:-./logs}:/trinity/logs:delegated
    ports:
      - ${DOCKER_BNET_PORT:-1119}:1119
      - ${DOCKER_BNET_REST_LOGIN_PORT:-8081}:8081
    depends_on:
      tc-database:
        condition: service_healthy

  tc-builder:
    container_name: tc-builder
    image: tc-builder:${DOCKER_IMAGE_TAG:-master}
    build:
      context: .
      target: build
      dockerfile: contrib/Docker/Dockerfile
    profiles: [tools]

networks:
  tc-network:
